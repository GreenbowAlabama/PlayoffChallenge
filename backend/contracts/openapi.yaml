openapi: 3.0.0
info:
  title: Custom Contests API
  description: Canonical source of truth for all public API response shapes used by iOS
  version: 1.2.0

servers:
  - url: https://api.playoffchallenge.com
    description: Production
  - url: http://localhost:3000
    description: Development

paths:
  /api/custom-contests/{id}:
    get:
      tags:
        - Contests
      summary: Get contest by ID
      description: Retrieve a specific contest instance with full details including standings (if LIVE or COMPLETE)
      operationId: getContestById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Contest instance UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Contest found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContestDetailResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Contest not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Contests
      summary: Delete a contest instance
      description: |
        Delete a contest instance. Only the organizer can delete.
        Can only delete SCHEDULED contests with entry_count ≤ 1, or already-CANCELLED contests (idempotent).
        Returns the updated contest with status=CANCELLED.
      operationId: deleteContestById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Contest instance UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Contest deleted (or already cancelled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContestDetailResponse'
        '400':
          description: Invalid UUID format (user ID or contest ID)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - insufficient permissions or invalid lifecycle state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error_code: CONTEST_DELETE_NOT_ALLOWED
                reason: Cannot delete contest in LOCKED status with 5 participants
        '404':
          description: Contest not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error_code: CONTEST_NOT_FOUND
                reason: Contest not found

  /api/custom-contests/{id}/entry:
    delete:
      tags:
        - Contests
      summary: Remove user participation from a contest
      description: |
        Unjoin a contest (remove participant entry).
        User can only unjoin SCHEDULED contests before lock_time.
        Idempotent: returns 200 if user has no entry.
        Returns the updated contest instance with user_has_entered=false.
      operationId: deleteContestEntry
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Contest instance UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successfully unjoined contest (or user was not a participant)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContestDetailResponse'
        '400':
          description: Invalid UUID format (user ID or contest ID)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - cannot unjoin (not SCHEDULED or past lock_time)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error_code: CONTEST_UNJOIN_NOT_ALLOWED
                reason: Cannot unjoin contest in LIVE status
        '404':
          description: Contest not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error_code: CONTEST_NOT_FOUND
                reason: Contest not found

  /api/custom-contests/{id}/picks:
    post:
      tags:
        - Contests
      summary: Submit or update golfer/player picks for a contest
      description: |
        Submit or update a roster of player picks for a PGA contest.
        Only available for SCHEDULED contests before lock_time.
        Upsert semantics: submitting again replaces the previous picks.
      operationId: submitPicks
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Contest instance UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PicksSubmissionRequest'
      responses:
        '200':
          description: Picks submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PicksSubmissionResponse'
        '400':
          description: Invalid input (wrong roster size, duplicates, unknown players)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseWithErrors'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - user is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Contest not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - contest is not SCHEDULED or entry window is closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/custom-contests/{id}/my-entry:
    get:
      tags:
        - Contests
      summary: Get user's current picks and entry context
      description: |
        Retrieve the user's current golfer picks for a contest, edit capability,
        lock time, roster configuration, and available players to pick.
        Available players are null if tournament field has not been populated yet.
      operationId: getMyEntry
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Contest instance UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User entry and context retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyEntryResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Contest not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/custom-contests/{id}/rules:
    get:
      tags:
        - Contests
      summary: Get contest scoring rules and configuration
      description: |
        Retrieve the scoring rules, roster configuration, and payout structure for a contest.
        Rules are determined by the contest's scoring_strategy (e.g., pga_standard_v1).
      operationId: getContestRules
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Contest instance UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Rules retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContestRulesResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Contest not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/custom-contests:
    get:
      tags:
        - Contests
      summary: List my contests
      description: |
        Retrieve all contest instances where the requesting user is either the organizer or a participant.
        This represents "My Contests" — all contests the user has engagement with.
        Includes contests in statuses: SCHEDULED, LOCKED, LIVE, COMPLETE.
        Includes metadata for each contest but NOT standings (list endpoint).

        Architecture: Client Lock V1 — single authoritative backend response for home tab composition.
        Client must NOT merge this with other endpoints.
      operationId: listMyContests
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of contests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContestListItem'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Contests
      summary: Create a new contest instance
      description: Create a new contest instance from a template. Requires authentication.
      operationId: createContest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContestRequest'
      responses:
        '201':
          description: Contest created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContestDetailResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/custom-contests/available:
    get:
      tags:
        - Contests
      summary: List publicly joinable contests
      description: |
        Retrieve all SCHEDULED contests that are published (have join_token) and publicly joinable.
        Includes `user_has_entered` to indicate if the requesting user has already joined.
        Does NOT filter by capacity or enrollment status.
      operationId: listAvailableContests
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of available contests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContestListItem'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/custom-contests/templates:
    get:
      tags:
        - Contests
      summary: List contest templates
      description: Retrieve all active contest templates available for creating new contests.
      operationId: listTemplates
      responses:
        '200':
          description: List of available templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContestTemplate'

  /api/custom-contests/join/{token}:
    get:
      tags:
        - Contests
      summary: Resolve join token (pre-auth)
      description: |
        Validate and resolve a contest join token.
        This is a pre-authentication endpoint that returns contest metadata for onboarding.
        No authentication required.
      operationId: resolveJoinToken
      parameters:
        - name: token
          in: path
          required: true
          description: Join token
          schema:
            type: string
      responses:
        '200':
          description: Token resolved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinTokenResolution'
        '400':
          description: Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/custom-contests/{id}/publish:
    post:
      tags:
        - Contests
      summary: Publish a contest instance
      description: |
        Transition a contest from DRAFT to OPEN status.
        Generates a join_token for sharing with participants.
        Only the organizer can publish.
      operationId: publishContest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Contest instance UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Contest published successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishResponse'
        '400':
          description: Invalid contest ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - insufficient permissions or invalid lifecycle state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Contest not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/custom-contests/{id}/status:
    patch:
      tags:
        - Contests
      summary: Update contest status
      description: Update the status of a contest instance. Only the organizer can update.
      operationId: updateContestStatus
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Contest instance UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  description: New contest status
      responses:
        '200':
          description: Contest status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContestDetailResponse'
        '400':
          description: Invalid request or contest ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - insufficient permissions or invalid status transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Contest not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/custom-contests/{id}/join:
    post:
      tags:
        - Contests
      summary: Join a contest as a participant
      description: |
        Join a contest instance as a participant.
        Enforces capacity limits, uniqueness (ALREADY_JOINED), and status checks.
      operationId: joinContest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Contest instance UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successfully joined contest
          content:
            application/json:
              schema:
                type: object
                required:
                  - joined
                properties:
                  joined:
                    type: boolean
                    enum: [true]
                  participant:
                    type: object
        '400':
          description: Invalid contest ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Contest not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot join (already joined, full, or locked)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/custom-contests/{id}/leaderboard:
    get:
      tags:
        - Contests
      summary: Get contest leaderboard
      description: |
        Retrieve the leaderboard for a contest with participant standings.
        Only available when contest status is LIVE or COMPLETE.
      operationId: getLeaderboard
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Contest instance UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Leaderboard retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Leaderboard'
        '400':
          description: Invalid contest ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Contest not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/payments/intents:
    post:
      tags:
        - Payments
      summary: Create a payment intent
      description: |
        Create a Stripe payment intent for contest entry fees.
        Requires Idempotency-Key header to ensure safe retries.
      operationId: createPaymentIntent
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: Unique key for idempotency (UUID or string)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - contest_instance_id
                - amount_cents
              properties:
                contest_instance_id:
                  type: string
                  format: uuid
                  description: Contest instance UUID
                amount_cents:
                  type: integer
                  minimum: 1
                  description: Payment amount in cents
      responses:
        '200':
          description: Payment intent created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntent'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/webhooks/stripe:
    post:
      tags:
        - Webhooks
      summary: Stripe webhook handler
      description: |
        Receive and process Stripe webhook events.
        Validates stripe-signature header.
        Idempotent: duplicate events return 200 with duplicate flag.
      operationId: handleStripeWebhook
      parameters:
        - name: stripe-signature
          in: header
          required: true
          description: Stripe signature for HMAC validation
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw Stripe event JSON
      responses:
        '200':
          description: Webhook processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAcknowledgment'
        '400':
          description: Invalid or missing stripe-signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Referenced payment intent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users:
    post:
      tags:
        - Auth
      summary: Create a new user account
      description: Register a new user account.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: Register a new user account with email and password.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Login user
      description: Authenticate a user with email and password.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid credentials or request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/user:
    delete:
      tags:
        - Auth
      summary: Delete user account
      description: |
        Delete the authenticated user's account. Irreversible.

        User can only delete their own account. Account deletion is prevented if:
        - User organizes one or more contests (organizer_id in contest_instances)
        - User has wallet ledger entries (ledger.user_id)
      operationId: deleteUser
      parameters:
        - name: userId
          in: query
          required: true
          description: User ID to delete (must match authenticated user)
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
        '400':
          description: Invalid request or cannot delete account due to active obligations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - type: object
                    properties:
                      reason:
                        type: string
                        description: Detailed reason for the error
              examples:
                invalid_uuid:
                  value:
                    error: 'Invalid user ID format'
                invalid_token:
                  value:
                    error: 'Invalid authentication token format'
                has_contests:
                  value:
                    error: 'Cannot delete account'
                    reason: 'You organize active contests. Transfer or cancel them first.'
                has_wallet_balance:
                  value:
                    error: 'Cannot delete account'
                    reason: 'Your wallet contains $50.00. Withdraw your funds first.'
                has_pending_payouts:
                  value:
                    error: 'Cannot delete account'
                    reason: 'You have pending withdrawal requests. Wait for them to complete first.'
                has_pending_deposits:
                  value:
                    error: 'Cannot delete account'
                    reason: 'You have pending deposit transactions. Please wait for them to complete.'
        '401':
          description: Unauthorized - authentication required or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_auth:
                  value:
                    error: 'Unauthorized - authentication required'
                user_not_found:
                  value:
                    error: 'Unauthorized - user not found'
        '403':
          description: Forbidden - user can only delete their own account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'Forbidden - you can only delete your own account'

  /api/wallet:
    get:
      tags:
        - Wallet
      summary: Get user wallet balance
      description: Retrieve the authenticated user's wallet balance in cents. For transaction history, use GET /api/wallet/transactions.
      operationId: getWallet
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Wallet balance retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - balance_cents
                properties:
                  balance_cents:
                    type: integer
                    description: Current wallet balance in cents
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/wallet/fund:
    post:
      tags:
        - Wallet
      summary: Create wallet top-up PaymentIntent
      description: Create a Stripe PaymentIntent for depositing funds into the wallet (QA/testing)
      operationId: fundWallet
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: Unique request identifier for idempotency
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletFundRequest'
      responses:
        '200':
          description: PaymentIntent created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletFundResponse'
        '400':
          description: Invalid request (amount, header, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error (Stripe or database)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/wallet/withdraw:
    post:
      tags:
        - Wallet
      summary: Create wallet withdrawal request
      description: Create a withdrawal request to transfer funds from wallet to bank account
      operationId: withdrawFunds
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: Unique request identifier for idempotency
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletWithdrawRequest'
      responses:
        '200':
          description: Withdrawal created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletWithdrawResponse'
        '400':
          description: |
            Invalid request (amount, method, header, Stripe account validation, etc.)
            Possible error codes:
            - STRIPE_ACCOUNT_REQUIRED: User has not connected a Stripe account
            - STRIPE_ACCOUNT_INCOMPLETE: Stripe account setup is incomplete (missing payouts_enabled or details_submitted)
            - VALIDATION_ERROR: Invalid amount, method, or other validation errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Insufficient wallet funds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/wallet/transactions:
    get:
      tags:
        - Wallet
      summary: Get user wallet transaction history
      description: Retrieve the authenticated user's wallet transaction history (ledger entries), sorted by date (newest first)
      operationId: getWalletTransactions
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          description: "Maximum number of transactions to return (default: 50, max: 100)"
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          description: "Number of transactions to skip (default: 0)"
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Transaction history retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletTransactionsResponse'
        '400':
          description: Invalid parameters (limit, offset, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/stripe/connect/onboard:
    post:
      tags:
        - Wallet
      summary: Start Stripe Connect onboarding for user
      description: Creates or reuses user's Stripe Express account and returns onboarding link for KYC and bank account setup
      operationId: startStripeOnboarding
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Onboarding link generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    description: Stripe onboarding link (expires after 24h)
                    example: "https://connect.stripe.com/onboarding/acct_xxxxx"
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Stripe API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/stripe/connect/status:
    get:
      tags:
        - Wallet
      summary: Get Stripe Connect account status
      description: Returns current onboarding status from live Stripe account (payouts_enabled, details_submitted, charges_enabled)
      operationId: getStripeConnectStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account status
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected:
                    type: boolean
                    description: Whether user has connected a Stripe account
                  charges_enabled:
                    type: boolean
                    description: Account can accept charges (if connected)
                    nullable: true
                  payouts_enabled:
                    type: boolean
                    description: Account can receive payouts to bank (if connected)
                    nullable: true
                  details_submitted:
                    type: boolean
                    description: Account completed KYC requirements (if connected)
                    nullable: true
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Stripe API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT bearer authentication. Tokens are issued by authentication endpoints
        (POST /api/users, POST /api/auth/register, POST /api/auth/login).
        Clients must include the token in requests using:
        Authorization: Bearer <token>

  schemas:
    # --- Main Response Objects ---

    ContestDetailResponse:
      type: object
      description: |
        Full contest details returned by GET /api/custom-contests/:id.
        Includes standings only when status is LIVE or COMPLETE.

        Lifecycle guarantees:
        - status: one of SCHEDULED, LOCKED, LIVE, COMPLETE, CANCELLED, ERROR
        - is_locked: true if status != SCHEDULED
        - is_live: true if status == LIVE
        - is_settled: true if settle_time is not null
        - standings: only present when status is LIVE or COMPLETE; omitted entirely for other statuses
        - time_until_lock: seconds until lock_time (for SCHEDULED contests only); null otherwise
      required:
        - id
        - contest_id
        - template_id
        - type
        - sport
        - organizer_id
        - entry_fee_cents
        - payout_structure
        - contest_name
        - max_entries
        - status
        - is_locked
        - is_live
        - is_settled
        - entry_count
        - user_has_entered
        - time_until_lock
        - leaderboard_state
        - actions
        - payout_table
        - roster_config
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Primary identifier for this contest instance
        contest_id:
          type: string
          format: uuid
          description: Alias of id (provided for client compatibility)
        template_id:
          type: string
          format: uuid
          description: Reference to the contest template this instance is based on
        type:
          type: string
          description: Contest type from template (e.g., playoff_challenge, pickem)
        sport:
          type: string
          description: Sport type (e.g., nfl, golf, basketball, baseball). Derived deterministically from template_type on backend.
        organizer_id:
          type: string
          format: uuid
          description: UUID of the user who created this contest
        organizer_name:
          type: string
          nullable: true
          description: |
            Display name of the contest organizer (computed from user.username or user.name).
            Null for legacy rows or if user record is missing.
            iOS defaults to "Unknown" if absent.
        entry_fee_cents:
          type: integer
          minimum: 0
          description: Entry fee in cents (0 = free contest)
        payout_structure:
          type: object
          description: "JSONB payout structure (e.g., { first: 70, second: 20, third: 10 })"
          nullable: true
        contest_name:
          type: string
          description: Display name for this contest
        start_time:
          type: string
          format: date-time
          nullable: true
          description: >
            ISO 8601 UTC timestamp when the contest becomes eligible to transition
            from SCHEDULED to LOCKED. Used by lifecycle reconciliation logic.
        end_time:
          type: string
          format: date-time
          nullable: true
          description: >
            ISO 8601 UTC timestamp when the contest becomes eligible to transition
            from LIVE to COMPLETE. Used by lifecycle reconciliation logic.
        lock_time:
          type: string
          format: date-time
          nullable: true
          description: |
            Lock time for this contest (ISO 8601, UTC).
            Null for unlimited entry window contests.
            Filters entries submitted after this time.
            Derived field: time_until_lock is computed from this value.
        max_entries:
          type: integer
          nullable: true
          description: Maximum number of participants (null = unlimited capacity)
        join_token:
          type: string
          nullable: true
          description: Token for joining this contest (null if not yet published)
        created_at:
          type: string
          format: date-time
          description: Timestamp when this contest was created (ISO 8601)
        updated_at:
          type: string
          format: date-time
          description: Timestamp when this contest was last updated (ISO 8601)
        is_platform_owned:
          type: boolean
          nullable: true
          description: Optional flag indicating if contest is platform-owned (may be undefined in legacy rows)
        status:
          $ref: '#/components/schemas/ContestStatus'
        is_locked:
          type: boolean
          description: Derived field - true if status != SCHEDULED
        is_live:
          type: boolean
          description: Derived field - true if status == LIVE
        is_settled:
          type: boolean
          description: Derived field - true if settle_time is not null
        entry_count:
          type: integer
          minimum: 0
          description: Number of participants currently joined
        user_has_entered:
          type: boolean
          description: Whether the authenticated user has already joined this contest
        time_until_lock:
          type: integer
          nullable: true
          description: |
            Seconds until lock_time for SCHEDULED contests (null otherwise).
            Computed as max(0, floor((lock_time - now) / 1000)).
        standings:
          type: array
          items:
            $ref: '#/components/schemas/Standing'
          nullable: true
          description: |
            Participant standings (only present when status is LIVE or COMPLETE).
            Omitted entirely for other statuses.
        leaderboard_state:
          $ref: '#/components/schemas/LeaderboardState'
        actions:
          $ref: '#/components/schemas/Actions'
        payout_table:
          type: array
          items:
            $ref: '#/components/schemas/PayoutRow'
          description: Derived payout structure for presentation
        roster_config:
          $ref: '#/components/schemas/RosterConfig'

    ContestListItem:
      type: object
      description: |
        Contest metadata for list endpoints (GET /api/custom-contests, GET /api/custom-contests/available).
        Similar to ContestDetailResponse but excludes standings and contest_id alias.
        Includes additional template metadata and lock_time field.
      required:
        - id
        - organizer_id
        - organizer_name
        - entry_fee_cents
        - payout_structure
        - contest_name
        - max_entries
        - status
        - is_locked
        - is_live
        - is_settled
        - entry_count
        - user_has_entered
        - time_until_lock
        - lock_time
        - template_name
        - sport
        - template_type
        - leaderboard_state
        - actions
        - payout_table
        - roster_config
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        organizer_id:
          type: string
          format: uuid
        organizer_name:
          type: string
          description: Display name of the organizer (computed from user.username or user.name)
        entry_fee_cents:
          type: integer
          minimum: 0
        payout_structure:
          type: object
          nullable: true
        contest_name:
          type: string
        start_time:
          type: string
          format: date-time
          nullable: true
          description: >
            ISO 8601 UTC timestamp when the contest becomes eligible to transition
            from SCHEDULED to LOCKED. Used by lifecycle reconciliation logic.
        end_time:
          type: string
          format: date-time
          nullable: true
          description: >
            ISO 8601 UTC timestamp when the contest becomes eligible to transition
            from LIVE to COMPLETE. Used by lifecycle reconciliation logic.
        lock_time:
          type: string
          format: date-time
          nullable: true
          description: |
            Lock time for this contest (only in list responses, not in detail).
            Null for SCHEDULED contests without a lock window.
        max_entries:
          type: integer
          nullable: true
        join_token:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        is_platform_owned:
          type: boolean
          nullable: true
        template_name:
          type: string
          description: Name of the template used for this contest
        sport:
          type: string
          description: Sport type (e.g., nfl, golf, basketball, baseball). Derived deterministically from template_type on backend.
        template_type:
          type: string
          description: Template type (e.g., playoff_challenge)
        status:
          $ref: '#/components/schemas/ContestStatus'
        is_locked:
          type: boolean
        is_live:
          type: boolean
        is_settled:
          type: boolean
        entry_count:
          type: integer
          minimum: 0
        user_has_entered:
          type: boolean
        time_until_lock:
          type: integer
          nullable: true
        leaderboard_state:
          $ref: '#/components/schemas/LeaderboardState'
        actions:
          $ref: '#/components/schemas/Actions'
        payout_table:
          type: array
          items:
            $ref: '#/components/schemas/PayoutRow'
        roster_config:
          $ref: '#/components/schemas/RosterConfig'

    ContestListResponse:
      type: array
      items:
        $ref: '#/components/schemas/ContestListItem'
      description: |
        Array of contest list items returned by GET /api/custom-contests and
        GET /api/custom-contests/available. Each item is a ContestListItem.

    # --- Derived Component Schemas ---

    ContestStatus:
      type: string
      enum:
        - SCHEDULED
        - LOCKED
        - LIVE
        - COMPLETE
        - CANCELLED
        - ERROR
      description: |
        Contest lifecycle status.
        - SCHEDULED: Contest is draft or published but not yet active
        - LOCKED: Entry window has closed, pending or in contest
        - LIVE: Contest is currently active, participants can view standings
        - COMPLETE: Contest has finished, final standings are computed
        - CANCELLED: Contest was cancelled (no payouts)
        - ERROR: Contest encountered an error (standings omitted)

    LeaderboardState:
      type: string
      enum:
        - pending
        - computed
        - error
      description: |
        Leaderboard availability state.
        - pending: Contest is LIVE or COMPLETE but settlement_records does not exist yet
        - computed: settlement_records exists (final standings available)
        - error: Contest is in ERROR status

    Actions:
      type: object
      description: |
        Derived capability flags indicating what actions the authenticated user can perform
        on this contest.
      required:
        - can_join
        - can_edit_entry
        - is_live
        - is_closed
        - is_scoring
        - is_scored
        - is_read_only
        - can_share_invite
        - can_manage_contest
        - can_delete
        - can_unjoin
      properties:
        can_join:
          type: boolean
          description: |
            User can join: status==SCHEDULED AND lock_time set AND before lock AND not full AND user not entered
        can_edit_entry:
          type: boolean
          description: |
            User can edit their entry: status==SCHEDULED AND lock_time set AND before lock AND user entered
        is_live:
          type: boolean
          description: Status is LIVE
        is_closed:
          type: boolean
          description: Status is COMPLETE, CANCELLED, or ERROR
        is_scoring:
          type: boolean
          description: |
            Contest is being scored: leaderboard_state==pending AND status in [LIVE, COMPLETE]
        is_scored:
          type: boolean
          description: |
            Contest has final scores: leaderboard_state==computed
        is_read_only:
          type: boolean
          description: |
            User cannot join or edit: !(can_join || can_edit_entry)
        can_share_invite:
          type: boolean
          description: |
            User can share contest invite: user is authenticated AND status != ERROR
        can_manage_contest:
          type: boolean
          description: |
            User is the contest organizer (case-insensitive UUID comparison)
        can_delete:
          type: boolean
          description: |
            User can delete the contest: user is the organizer AND status==SCHEDULED.
            Only organizers can delete, and only before lock_time.
        can_unjoin:
          type: boolean
          description: |
            User can unjoin the contest: user has entered AND status==SCHEDULED.
            Applies to all users (including organizers) who have joined the contest.
            Unjoin removes participant entry; organizers retain ownership and cancel authority.

    PayoutRow:
      type: object
      description: |
        Single payout tier in the payout table.

        Contract notes:
        - rank_min and rank_max MUST exist (required for iOS decoder)
        - amount field (not min/max or position names) MUST exist
        - amount is null until settlement; iOS decoder expects field to exist
      required:
        - place
        - rank_min
        - rank_max
        - amount
        - payout_percent
        - currency
      properties:
        place:
          type: string
          description: Place name (e.g., first, second, third)
        rank_min:
          type: integer
          minimum: 1
          description: Minimum rank in this tier (1-based)
        rank_max:
          type: integer
          minimum: 1
          description: Maximum rank in this tier (1-based)
        amount:
          type: integer
          nullable: true
          description: |
            Dollar amount in cents (null until settlement).
            Computed at settlement time from payout_percent and entry_fee_cents * entry_count.
        payout_percent:
          type: integer
          nullable: true
          description: Percentage of total pool (e.g., 70 for 70%)
        currency:
          type: string
          description: Currency code (always USD)

    PayoutStructure:
      type: object
      description: Selected payout distribution for a contest
      required:
        - type
      properties:
        type:
          type: string
          description: Identifier of payout strategy (e.g. winner_take_all, top_n_split)
        max_winners:
          type: integer
          nullable: true
          description: Maximum winners if payout strategy supports multiple winners

    Standing:
      type: object
      description: Individual participant standing in the contest leaderboard
      properties:
        user_id:
          type: string
          format: uuid
        user_display_name:
          type: string
        total_score:
          type: number
        rank:
          type: integer
          minimum: 1

    ErrorResponse:
      type: object
      description: |
        Structured error response for service-layer validation failures.
        Used across all public endpoints for permission, lifecycle, and validation errors.
      required:
        - error_code
        - message
      properties:
        error_code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
          description: Human-readable error description
        reason:
          type: string
          description: Additional context (for backward compatibility)

    ErrorCode:
      type: string
      enum:
        - CONTEST_NOT_FOUND
        - CONTEST_DELETE_NOT_ALLOWED
        - CONTEST_UNJOIN_NOT_ALLOWED
        - ALREADY_JOINED
        - CONTEST_FULL
        - CONTEST_LOCKED
        - VALIDATION_ERROR
        - UNAUTHORIZED
        - PAYMENT_INTENT_NOT_FOUND
        - STRIPE_SIGNATURE_INVALID
        - ACCOUNT_DELETION_BLOCKED
        - STRIPE_ACCOUNT_REQUIRED
        - STRIPE_ACCOUNT_INCOMPLETE
      description: Machine-readable error code enumeration

    ContestTemplate:
      type: object
      description: Contest template metadata
      required:
        - id
        - name
        - type
        - sport
        - is_active
        - allowed_payout_structures
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          description: Template type (e.g., playoff_challenge, pickem)
        sport:
          type: string
          description: Sport type (e.g., NFL, NBA)
        is_active:
          type: boolean
        allowed_payout_structures:
          type: array
          description: List of payout structures allowed for this template. Backend authoritative.
          items:
            $ref: '#/components/schemas/PayoutStructure'

    JoinTokenResolution:
      type: object
      description: Result of resolving a contest join token
      required:
        - valid
      properties:
        valid:
          type: boolean
        contest:
          $ref: '#/components/schemas/ContestListItem'
          description: Contest details (only if valid=true)
        error_code:
          $ref: '#/components/schemas/ErrorCode'
          description: Error code if invalid
        reason:
          type: string
          description: Human-readable reason if invalid

    CreateContestRequest:
      type: object
      description: Request body for creating a new contest instance
      required:
        - template_id
        - entry_fee_cents
        - payout_structure
      properties:
        template_id:
          type: string
          format: uuid
          description: Template to use for this contest
        contest_name:
          type: string
          description: Display name for the contest
        max_entries:
          type: integer
          nullable: true
          description: Maximum number of participants (null = unlimited)
        entry_fee_cents:
          type: integer
          minimum: 0
          description: Entry fee in cents
        payout_structure:
          $ref: '#/components/schemas/PayoutStructure'
        start_time:
          type: string
          format: date-time
          nullable: true
          description: >
            ISO 8601 UTC timestamp when the contest becomes eligible to transition
            from SCHEDULED to LOCKED. Used by lifecycle reconciliation logic.
        lock_time:
          type: string
          format: date-time
          nullable: true
          description: >
            Lock time for contest entry window (ISO 8601, UTC).
            If null, contest has unlimited entry window.
        settlement_time:
          type: string
          format: date-time
          nullable: true

    PublishResponse:
      type: object
      description: Response when publishing a contest
      required:
        - contestId
        - joinToken
        - joinURL
      properties:
        contestId:
          type: string
          format: uuid
        joinToken:
          type: string
          description: Token for joining this contest
        joinURL:
          type: string
          description: Full URL for sharing the contest join link

    PaymentIntent:
      type: object
      description: Stripe payment intent response
      required:
        - payment_intent_id
        - status
        - client_secret
      properties:
        payment_intent_id:
          type: string
          description: Stripe payment intent ID
        status:
          type: string
          description: Stripe payment status (requires_payment_method, processing, succeeded, etc.)
        client_secret:
          type: string
          description: Client secret for Stripe.js integration
        currency:
          type: string
          example: USD
          description: Currency code

    WebhookAcknowledgment:
      type: object
      description: Acknowledgment of webhook receipt
      required:
        - received
        - stripe_event_id
      properties:
        received:
          type: boolean
          enum: [true]
        duplicate:
          type: boolean
          description: True if this is a duplicate event
        stripe_event_id:
          type: string
          description: Stripe event ID

    CreateUserRequest:
      type: object
      description: Request to create a new user
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          description: User password (plain text, should be over HTTPS)
        username:
          type: string

    RegisterRequest:
      type: object
      description: User registration request
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        username:
          type: string

    LoginRequest:
      type: object
      description: User login request
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    UserResponse:
      type: object
      description: User account response
      required:
        - id
        - email
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
        created_at:
          type: string
          format: date-time
        token:
          type: string
          description: "JWT bearer token used as Authorization: Bearer <token>"

    Leaderboard:
      type: object
      description: Contest leaderboard response with standings and metadata
      required:
        - contest_id
        - contest_type
        - leaderboard_state
        - column_schema
        - rows
      properties:
        contest_id:
          type: string
          format: uuid
          description: Contest instance UUID
        contest_type:
          type: string
          description: Type of contest (e.g., "golf", "playoff")
        leaderboard_state:
          type: string
          enum: [pending, computed, error, unknown]
          description: Leaderboard computation state
        generated_at:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp when leaderboard was generated
        column_schema:
          type: array
          description: Column definitions for dynamic leaderboard rendering
          items:
            $ref: '#/components/schemas/LeaderboardColumn'
        rows:
          type: array
          description: Array of participant standings
          items:
            $ref: '#/components/schemas/LeaderboardRow'

    LeaderboardColumn:
      type: object
      description: Column schema for leaderboard rendering
      required:
        - key
        - label
      properties:
        key:
          type: string
          description: Column identifier (e.g., "rank", "username", "total_score")
        label:
          type: string
          description: Display label for the column
        type:
          type: string
          nullable: true
          description: Data type hint (e.g., "integer", "string", "number")
        format:
          type: string
          nullable: true
          description: Format hint for rendering (e.g., "currency", "percentage")

    LeaderboardRow:
      type: object
      description: Individual standing entry in leaderboard
      required:
        - id
        - user_id
        - username
        - rank
        - values
      properties:
        id:
          type: string
          format: uuid
          description: Row identifier (typically same as user_id)
        user_id:
          type: string
          format: uuid
          description: User UUID
        username:
          type: string
          description: User display name
        rank:
          type: integer
          description: Ranking position in leaderboard
        values:
          type: object
          description: Dynamic values including scores and computed fields
          additionalProperties: true
        tier:
          type: integer
          nullable: true
          description: Optional tier/division indicator

    LedgerEntry:
      type: object
      description: Wallet ledger transaction entry
      properties:
        id:
          type: string
          format: uuid
        entry_type:
          type: string
          description: Type of ledger entry (e.g., WALLET_DEPOSIT, WALLET_DEBIT, ENTRY_FEE)
        direction:
          type: string
          enum: [CREDIT, DEBIT]
        amount_cents:
          type: integer
          description: Amount in cents
        currency:
          type: string
          default: USD
        reference_type:
          type: string
          description: Type of related entity (WALLET, CONTEST, stripe_event)
        reference_id:
          type: string
          description: ID of related entity
        idempotency_key:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    WalletResponse:
      type: object
      description: User wallet balance and transaction history
      required:
        - balance_cents
      properties:
        balance_cents:
          type: integer
          description: Current wallet balance in cents
        ledger:
          type: array
          description: Recent wallet transactions (newest first)
          items:
            $ref: '#/components/schemas/LedgerEntry'

    WalletFundRequest:
      type: object
      description: Request to create wallet top-up PaymentIntent
      required:
        - amount_cents
      properties:
        amount_cents:
          type: integer
          description: Amount to deposit in cents (must be positive)

    WalletFundResponse:
      type: object
      description: Response from wallet fund request
      required:
        - client_secret
        - amount_cents
      properties:
        client_secret:
          type: string
          description: Stripe PaymentIntent client secret for payment sheet
        amount_cents:
          type: integer
          description: Amount to be deposited in cents

    WalletWithdrawRequest:
      type: object
      description: Request to create wallet withdrawal
      required:
        - amount_cents
        - method
      properties:
        amount_cents:
          type: integer
          description: Amount to withdraw in cents (must be positive)
        method:
          type: string
          enum: [standard, instant]
          description: Withdrawal method (standard or instant)

    WalletWithdrawResponse:
      type: object
      description: Response from wallet withdrawal request
      required:
        - withdrawal_id
        - status
        - amount_cents
      properties:
        withdrawal_id:
          type: string
          format: uuid
          description: Withdrawal request ID
        status:
          type: string
          description: Current withdrawal status (REQUESTED, PROCESSING, PAID, FAILED, CANCELLED)
        amount_cents:
          type: integer
          description: Withdrawal amount in cents

    WalletTransactionsResponse:
      type: object
      description: Response containing wallet transaction history
      required:
        - transactions
        - total_count
      properties:
        transactions:
          type: array
          description: Array of wallet transactions (newest first)
          items:
            $ref: '#/components/schemas/WalletTransaction'
        total_count:
          type: integer
          description: Total number of transactions for this user (across all pages)

    WalletTransaction:
      type: object
      description: A single wallet transaction ledger entry
      required:
        - id
        - entry_type
        - direction
        - amount_cents
        - reference_type
        - reference_id
        - description
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique transaction ID
        entry_type:
          type: string
          enum: [ENTRY_FEE, WALLET_DEPOSIT, WALLET_WITHDRAWAL, PAYOUT_COMPLETED]
          description: Type of transaction
        direction:
          type: string
          enum: [DEBIT, CREDIT]
          description: Transaction direction (money out or money in)
        amount_cents:
          type: integer
          description: Transaction amount in cents
        reference_type:
          type: string
          enum: [CONTEST, WALLET, PAYOUT_TRANSFER]
          description: Type of resource this transaction references
        reference_id:
          type: string
          format: uuid
          description: ID of the referenced resource (contest ID, user ID, payout ID, etc.)
        description:
          type: string
          description: Human-readable description of the transaction
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when transaction occurred

    PicksSubmissionRequest:
      type: object
      description: Request to submit golfer/player picks for a contest
      required:
        - player_ids
      properties:
        player_ids:
          type: array
          items:
            type: string
          description: Array of player IDs (golfer IDs for PGA)
          example: ["player-123", "player-456", "player-789"]

    PicksSubmissionResponse:
      type: object
      description: Response after submitting picks
      required:
        - success
        - player_ids
        - updated_at
      properties:
        success:
          type: boolean
          description: Whether picks were submitted successfully
        player_ids:
          type: array
          items:
            type: string
          description: Submitted player IDs
        updated_at:
          type: string
          format: date-time
          description: Timestamp of submission/update

    PlayerInfo:
      type: object
      description: Information about a player (golfer) available for selection
      required:
        - player_id
        - name
      properties:
        player_id:
          type: string
          description: Unique player identifier
        name:
          type: string
          description: Player display name

    MyEntryResponse:
      type: object
      description: User's current entry/picks and context for a contest
      required:
        - player_ids
        - can_edit
        - lock_time
        - roster_config
      properties:
        player_ids:
          type: array
          items:
            type: string
          description: User's currently selected player IDs (empty array if no entry)
        can_edit:
          type: boolean
          description: Whether user can still edit their picks (contest SCHEDULED and before lock_time)
        lock_time:
          type: string
          format: date-time
          nullable: true
          description: Entry lock time (null if no time-based lock)
        roster_config:
          $ref: '#/components/schemas/RosterConfig'
        available_players:
          type: array
          items:
            $ref: '#/components/schemas/PlayerInfo'
          nullable: true
          description: Available players to pick from tournament field (null if field not yet populated)

    RosterConfig:
      type: object
      description: Roster configuration for a contest type
      properties:
        roster_size:
          type: integer
          description: Number of players required in roster
          example: 7
        lineup_size:
          type: integer
          description: Number of players in lineup (PGA tournaments)
          example: 7
        scoring_count:
          type: integer
          description: Number of scores that count toward final score
          example: 6
        drop_lowest:
          type: boolean
          description: Whether lowest score is automatically dropped
          example: true
        entry_fields:
          type: array
          items:
            type: string
          description: Fields that make up entry (e.g., player_ids)
        validation_rules:
          type: object
          description: Validation rules for roster (no_duplicates, must_be_in_field, etc.)
          additionalProperties: true

    ContestRulesResponse:
      type: object
      description: Scoring rules and payout configuration for a contest
      required:
        - scoring_strategy
        - hole_scoring
        - roster
        - tie_handling
        - payout_structure
      properties:
        scoring_strategy:
          type: string
          description: Scoring strategy key (e.g., pga_standard_v1)
        hole_scoring:
          type: object
          description: Points awarded per hole outcome
          properties:
            double_eagle_or_better:
              type: integer
            eagle:
              type: integer
            birdie:
              type: integer
            par:
              type: integer
            bogey:
              type: integer
            double_bogey_or_worse:
              type: integer
        roster:
          type: object
          description: Roster configuration (size, format, etc.)
          properties:
            roster_size:
              type: integer
            scoring_format:
              type: string
            description:
              type: string
        bonuses:
          type: object
          description: Bonus point rules and descriptions
          additionalProperties:
            type: string
        tie_handling:
          type: string
          description: How ties are handled in rankings
        payout_structure:
          type: object
          description: Prize pool payout configuration
          additionalProperties: true

    StripeOnboardingLinkResponse:
      type: object
      description: Response containing Stripe Connect onboarding URL and CSRF state token
      required:
        - onboarding_url
        - state
      properties:
        onboarding_url:
          type: string
          format: uri
          description: URL to Stripe Connect onboarding page
          example: "https://connect.stripe.com/onboarding/..."
        state:
          type: string
          description: CSRF state token for security
          example: "random_32byte_hex_string"

    StripeAccountStatusResponse:
      type: object
      description: Response containing Stripe account status and details
      required:
        - linked
      properties:
        linked:
          type: boolean
          description: Whether user has linked a Stripe account
        accountId:
          type: string
          nullable: true
          description: Stripe Connected Account ID (if linked)
          example: "acct_1234567890abcdef"
        chargesEnabled:
          type: boolean
          nullable: true
          description: Whether account can accept charges
        payoutsEnabled:
          type: boolean
          nullable: true
          description: Whether account can send payouts
        ready_for_payouts:
          type: boolean
          nullable: true
          description: Whether account is fully ready to receive payouts (all requirements met)
          example: true
        detailsSubmitted:
          type: boolean
          nullable: true
          description: Whether account details have been submitted to Stripe
          example: true
        requirementsDue:
          type: array
          items:
            type: string
          nullable: true
          description: List of pending requirements from Stripe (if any)
          example: ["individual.verification.document"]

    StripeAccountCallbackRequest:
      type: object
      description: Request body for Stripe Connect OAuth callback processing
      required:
        - accountId
        - state
      properties:
        accountId:
          type: string
          description: Stripe Connected Account ID from callback
          example: "acct_1234567890abcdef"
        state:
          type: string
          description: CSRF state token (for verification)
          example: "random_32byte_hex_string"

    StripeAccountCallbackResponse:
      type: object
      description: Response confirming successful Stripe account linkage
      required:
        - success
        - accountId
      properties:
        success:
          type: boolean
          description: Whether callback was processed successfully
        accountId:
          type: string
          description: Stripe Connected Account ID (confirmed)
          example: "acct_1234567890abcdef"

    ErrorResponseWithErrors:
      type: object
      description: Error response that includes detailed error list
      required:
        - error_code
        - reason
      properties:
        error_code:
          type: string
          description: Structured error code
        reason:
          type: string
          description: Human-readable error message
        errors:
          type: array
          items:
            type: string
          description: Array of specific validation errors
